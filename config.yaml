# ============================================================
# Crawler Configuration
# ============================================================

crawler:
  # Maximum number of concurrent worker coroutines
  concurrency: 200

  # Maximum crawl duration in seconds (48 hours = 172800)
  max_time_seconds: 172800

  # User-Agent string sent with every request
  user_agent: "HW1-Crawler/0.1 (Architecture Design Course; +https://example.edu)"

  # Seed file path
  seeds_file: "seeds.txt"

# ============================================================
# Fetcher
# ============================================================
fetcher:
  # Per-request timeout in seconds
  timeout: 10

  # Maximum number of redirects to follow
  max_redirects: 5

  # Total connection pool size (should be >= concurrency)
  connection_pool_size: 210

  # Maximum connections to a single host
  per_host_connections: 1

  # Accepted content types (prefix match)
  accept_content_types:
    - "text/html"
    - "application/xhtml+xml"

# ============================================================
# Politeness
# ============================================================
politeness:
  # Maximum queries per second per domain
  max_qps: 0.5

  # robots.txt cache TTL in seconds (24 hours)
  robots_cache_ttl: 86400

  # Timeout for fetching robots.txt
  robots_fetch_timeout: 10

# ============================================================
# Sitemap Discovery
# ============================================================
sitemap:
  # Max sitemap XML files to process per domain
  max_xml_per_domain: 3

  # Queue only first N URLs per sitemap XML; rest bloom-only
  max_queue_per_sitemap: 500

  # Max sitemap discovery attempts per domain (with backoff)
  max_attempts_per_domain: 3

  # Retries per sitemap XML fetch attempt
  fetch_retries_per_sitemap: 3

  # Exponential backoff base (seconds): 0.5, 1.0, 2.0, ...
  retry_base_seconds: 0.5

# ============================================================
# Frontier
# ============================================================
frontier:
  # Bloom filter expected capacity (100M for 48h runs ≈ 160MB)
  bloom_capacity: 100_000_000

  # Bloom filter false-positive rate
  bloom_error_rate: 0.001

  # Maximum crawl depth from seed (-1 = unlimited)
  max_depth: -1

  # Checkpoint interval in seconds
  checkpoint_interval: 300

  # Checkpoint file path
  checkpoint_path: "checkpoint.pkl"

  # Maximum pending URLs in frontier (memory safety for 48h runs)
  # When full, new URLs from low-yield domains are dropped
  max_pending: 5_000_000

# ============================================================
# Storage
# ============================================================
storage:
  # SQLite database path
  db_path: "crawl_data.db"

  # Batch insert size
  batch_size: 100

# ============================================================
# Logging
# ============================================================
logging:
  level: "INFO"

  # Stats reporting interval in seconds
  stats_interval: 30

# ============================================================
# Notification (Discord webhook for crash alerts)
# ============================================================
notification:
  enabled: true
  # Create a webhook: Server Settings → Integrations → Webhooks → New
  discord_webhook: "https://discord.com/api/webhooks/1478267061678637147/ZaULPGyjIEzZaH_vJDoJTyJNoqHIteNB4BCAFDdRWQ-pJSDlnuNisKZc1je26Ut2wFNc"
